        <span>💳</span>
        <p id="expenseCount">0 ລາຍການ</p>
      </div>

    </div>

  </div>

  <div class="menu-grid">

    <a href="add.html" class="menu-btn">
      ➕ ເພີ່ມລາຍຈ່າຍ

      📜 ເບິ່ງລາຍການ

</html>
