<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ລາຍການທັງໝົດ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="top-bar">
    <a href="index.html">⬅ ກັບ</a>
  </div>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="🔍 ຄົ້ນຫາ..."
      onkeyup="renderExpenses()"
    >

    <select id="filterCategory" onchange="renderExpenses()">

      <option value="all">ທັງໝົດ</option>
      <option value="🍔 ອາຫານ">🍔 ອາຫານ</option>
      <option value="⛽ ນ້ຳມັນ">⛽ ນ້ຳມັນ</option>
      <option value="🛒 ຊື້ເຄື່ອງ">🛒 ຊື້ເຄື່ອງ</option>
      <option value="🚕 ເດີນທາງ">🚕 ເດີນທາງ</option>
      <option value="🎮 ເກມ">🎮 ເກມ</option>
      <option value="📦 ອື່ນໆ">📦 ອື່ນໆ</option>

    </select>

  </div>

  <div id="expenseList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
